name: GameOpsMini CI

on:
  push:
    branches:
      - main
      - develop
      - docker-image-build

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

permissions:
  contents: read

jobs:
  dotnet-build:
    name: .NET Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore GameOpsMini.slnx

      - name: Build solution
        run: >
          dotnet build GameOpsMini.slnx
          --configuration Release
          --no-restore
          --warnaserror

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: dotnet-build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            --file GameOpsMini.Api/Dockerfile \
            --tag gameops-api:ci \
            .

      - name: Build Worker image
        run: |
          docker build \
            --file GameOpsMini.Worker/Dockerfile \
            --tag gameops-worker:ci \
            .

      - name: Build Dashboard image
        run: |
          docker build \
            --file GameOpsMini.Dashboard/Dockerfile \
            --tag gameops-dashboard:ci \
            .

      - name: Build Dummy Server image
        run: |
          docker build \
            --file GameOpsMini.DummyServer/Dockerfile \
            --tag gameops-dummy-server:ci \
            .

      - name: Validate Docker Compose
        run: docker compose config
